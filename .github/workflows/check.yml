name: Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run selector checks
        run: npm run check

      - name: Check macOS build script syntax
        run: bash -n tools/build-macos.sh

      - name: Check Windows build script syntax
        shell: pwsh
        run: |
          $parseErrors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            (Join-Path $PWD 'tools/build-portable.ps1'), [ref]$null, [ref]$parseErrors) | Out-Null
          if ($parseErrors.Count -gt 0) {
            $parseErrors | ForEach-Object { Write-Error $_.Message }
            exit 1
          }
